# Global parameters
global:
  imageRegistry: ""
  imagePullSecrets: []
  defaultStorageClass: ""

# Override names generated by the chart
nameOverride: ""
fullnameOverride: ""

# Common labels/annotations applied to all resources
commonLabels: {}
commonAnnotations: {}

clusterDomain: cluster.local
replicaCount: 1
revisionHistoryLimit: 10

image:
  registry: ghcr.io
  repository: hkuds/lightrag
  tag: "v1.4.10"
  digest: ""
  pullPolicy: IfNotPresent
  pullSecrets: []
  # Legacy alias for compatibility with previous chart versions.
  imagePullSecrets: []

command: []
args: []

updateStrategy:
  type: Recreate

serviceAccount:
  create: true
  name: ""
  annotations: {}

automountServiceAccountToken: false

podAnnotations: {}
podLabels: {}

podSecurityContext:
  enabled: true
  fsGroup: 1001

containerSecurityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 1001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

containerPorts:
  # Leave empty to follow env.PORT.
  http: null

service:
  type: ClusterIP
  annotations: {}
  clusterIP: ""
  externalTrafficPolicy: ""
  sessionAffinity: None
  ports:
    http: 9621
  nodePorts:
    http: ""

ingress:
  enabled: false
  className: ""
  hostname: lightrag.local
  path: /
  pathType: Prefix
  annotations: {}
  tls: false
  extraHosts: []
  extraPaths: []
  extraTls: []

resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

livenessProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

readinessProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3
  successThreshold: 1

startupProbe:
  enabled: false
  path: /health
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30
  successThreshold: 1

customLivenessProbe: {}
customReadinessProbe: {}
customStartupProbe: {}

persistence:
  enabled: true
  ragStorage:
    enabled: true
    existingClaim: ""
    storageClass: ""
    annotations: {}
    # For replicaCount > 1, this must include ReadWriteMany when chart creates the PVC.
    accessModes:
      - ReadWriteOnce
    size: 10Gi
    mountPath: /app/data/rag_storage
  inputs:
    enabled: true
    existingClaim: ""
    storageClass: ""
    annotations: {}
    # For replicaCount > 1, this must include ReadWriteMany when chart creates the PVC.
    accessModes:
      - ReadWriteOnce
    size: 5Gi
    mountPath: /app/data/inputs

envSecret:
  existingSecret: ""
  # Key that stores dotenv content in the Secret. Required when existingSecret is set.
  secretKey: .env
  # Optional rollout token for external secret updates when lookup is unavailable.
  existingSecretVersion: ""

# Environment variables serialized to /app/.env inside the container.
# Existing deploy scripts keep using --set-string env.<KEY>=<VALUE>.
env:
  HOST: 0.0.0.0
  PORT: 9621
  WEBUI_TITLE: Graph RAG Engine
  WEBUI_DESCRIPTION: Simple and Fast Graph Based RAG System
  LLM_BINDING: openai
  LLM_MODEL: gpt-4o-mini
  LLM_BINDING_HOST: ""
  LLM_BINDING_API_KEY: ""
  EMBEDDING_BINDING: openai
  EMBEDDING_MODEL: text-embedding-ada-002
  EMBEDDING_DIM: 1536
  EMBEDDING_BINDING_API_KEY: ""
  LIGHTRAG_KV_STORAGE: PGKVStorage
  LIGHTRAG_VECTOR_STORAGE: PGVectorStorage
  LIGHTRAG_GRAPH_STORAGE: Neo4JStorage
  LIGHTRAG_DOC_STATUS_STORAGE: PGDocStatusStorage
  POSTGRES_HOST: pg-cluster-postgresql-postgresql
  POSTGRES_PORT: 5432
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: ""
  POSTGRES_DATABASE: postgres
  POSTGRES_WORKSPACE: default
  NEO4J_URI: neo4j://neo4j-cluster-neo4j:7687
  NEO4J_USERNAME: neo4j
  NEO4J_PASSWORD: ""
  QDRANT_URL: http://qdrant-cluster-qdrant-qdrant:6333
  # REDIS_URI: redis://default:${REDIS_PASSWORD}@redis-cluster-redis-redis:6379

# Additional env vars directly injected into the container spec.
extraEnvVars: []

# Refer to a ConfigMap/Secret containing key=value pairs for env injection.
extraEnvVarsCM: ""
extraEnvVarsSecret: ""

# Additional envFrom refs. Supports list of names or list of objects with name.
envFrom:
  configMaps: []
  configmaps: []
  secrets: []

nodeSelector: {}
tolerations: []
affinity: {}
priorityClassName: ""
schedulerName: ""
topologySpreadConstraints: []

extraVolumes: []
extraVolumeMounts: []
